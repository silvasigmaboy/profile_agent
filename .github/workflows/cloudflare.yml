name: Expose Proxy TCP

on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Squid Proxy
        run: |
          sudo apt-get update
          sudo apt-get install -y squid
          
          sudo truncate -s 0 /etc/squid/squid.conf
          echo "http_port 3128" | sudo tee -a /etc/squid/squid.conf
          echo "http_access allow all" | sudo tee -a /etc/squid/squid.conf
          sudo service squid restart

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start TCP Tunnel
        run: |
          cloudflared tunnel --url tcp://127.0.0.1:3128 > tunnel.log 2>&1 &
          sleep 10
          
          echo "====== PROXY ======"
          cat tunnel.log | grep tcp
          echo "==================="
          
          sleep 21600
