name: GitHub Proxy Tunnel

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest

    steps:
      - name: Install Squid
        run: |
          sudo apt-get update
          sudo apt-get install -y squid
          sudo truncate -s 0 /etc/squid/squid.conf
          echo "http_port 3128" | sudo tee -a /etc/squid/squid.conf
          echo "http_access allow all" | sudo tee -a /etc/squid/squid.conf
          sudo service squid restart

      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Start Cloudflare Tunnel
        uses: AnimMouse/setup-cloudflared/tunnel@v2
        with:
          cloudflare_tunnel_credential: ${{ secrets.CLOUDFLARE_TUNNEL_CREDENTIAL }}
          cloudflare_tunnel_configuration: ${{ vars.CLOUDFLARE_TUNNEL_CONFIGURATION }}
          cloudflare_tunnel_id: ${{ vars.CLOUDFLARE_TUNNEL_ID }}

      - name: Show Proxy Info
        run: |
          echo "Your proxy is available via Cloudflare TCP tunnel"
          echo "Use Cloudflare Access or TCP hostname from dashboard"
          curl https://api.ipify.org

      - name: Keep Alive
        run: sleep 21600

      - name: Shutdown Tunnel
        if: '! cancelled()'
        uses: AnimMouse/setup-cloudflared/shutdown@v2
