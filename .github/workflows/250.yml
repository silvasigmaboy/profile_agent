name: Matrix 250 Jobs

on:
  workflow_dispatch:
    inputs:
      matrix_count:
        description: "How many matrix jobs to create"
        required: true
        default: "250"

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Build matrix JSON
        id: build-matrix
        run: |
          COUNT="${{ inputs.matrix_count }}"
          MATRIX='{"id":['
          for i in $(seq 1 "$COUNT"); do
            if [ "$i" -gt 1 ]; then
              MATRIX="$MATRIX,"
            fi
            MATRIX="$MATRIX$i"
          done
          MATRIX="$MATRIX]}"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
        env:
          COUNT: ${{ inputs.matrix_count }}

  run-matrix:
    runs-on: ubuntu-latest
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    env:
      NODE_ENV: production
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      PROXY_PORT: ${{ secrets.PROXY_PORT }}
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Step 3: Install system dependencies
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Step 4: Install project dependencies
      - name: Install project dependencies
        run: npm install

      # Step 5: Install Playwright tools
      - name: Install Playwright tools
        run: npx playwright install

      # Step 6: Install missing dependencies
      - name: Install missing dependencies
        run: npm install generative-bayesian-network

      - name: Run Google scraper with xvfb
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npx tsx core/googlets-fg.ts
